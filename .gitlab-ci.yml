image: python:3.12-slim

stages:
  - lint
  - test

cache:
  paths:
    - .venv/

variables:
  UV_PROJECT_ENVIRONMENT: .venv

before_script:
  - pip install uv --quiet
  - uv sync --group dev

lint:
  stage: lint
  script:
    - uv run ruff check src/

test:
  stage: test
  script:
    - uv run pytest
