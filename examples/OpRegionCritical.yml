---
ast:
  id: opregion-kernel-space
  language: asl
  message: OperationRegion pointing to kernel space
  severity: warning

  rule:
    kind: OpRegionTerm
    all:
      - has:
          kind: NameString
          pattern: $REGNAME
      - has:
          kind: RegionSpaceKeyword
          regex: "SystemMemory"
          pattern: $REGSPACE
      - has:
          field: Offset
          kind: IntegerLiteral
          pattern: $OFFSET
      - has:
          field: Length
          kind: IntegerLiteral
          pattern: $LENGTH
logic:
  - id: address
    add: [$OFFSET, LENGTH]
  - id: suspicious-range
    in-range: [address, [0x00000000, 0xFFFFFFFF]]
return:
  - found: suspicious-range
  - not-found: otherwise
