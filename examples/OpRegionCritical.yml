---
ast:
  id: opregion-kernel-space
  language: asl
  message: OperationRegion pointing to kernel space
  severity: warning

  rule:
    kind: OpRegionTerm
    all:
      - has:
          kind: NameString
      - has:
          kind: RegionSpaceKeyword
          regex: "SystemMemory"
      - has:
          field: Offset
          kind: IntegerLiteral
      - has:
          field: Length
          kind: IntegerLiteral
logic:
  - id: address
    add: [variable_2, variable_3]
  - id: suspicious-range
    in-range: [address, [0x00000000, 0xC000FFFF]]


# OperationRegion (KRNL, SystemMemory, 0xC0000000, 0x1000)
#
# TermList: (ScopeTerm [6, 4] - [18, 5]
#       Location: (NameString [6, 11] - [6, 15]
#         (NameSeg [6, 12] - [6, 15]))
#       TermList: (OpRegionTerm [8, 8] - [8, 64]
#         RegionName: (NameString [8, 25] - [8, 29]
#           (NameSeg [8, 25] - [8, 29]))
#         RegionSpace: (RegionSpaceKeyword [8, 31] - [8, 43])
#         Offset: (IntegerLiteral [8, 45] - [8, 55])
#         Length: (IntegerLiteral [8, 57] - [8, 63]))
