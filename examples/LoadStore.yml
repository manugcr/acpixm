---
ast:
  id: match-suspicious-tables-managment
  language: asl
  message: Suspicious use of Load/Unload terms
  severity: warning

  rule:
    any:
      - pattern: Load ($OBJECT, $RESULT)
      - pattern: Store ($SOURCE, $DEST)
      - pattern: Unload ($OBJECT)
return:
  - found: ast
  - not-found: otherwise
