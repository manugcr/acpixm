---
id: match-asl
language: asl
message: message
severity: warning

utils:
  DEVICE_STMT:
    kind: device_stmt
    regex: PC00

rule:
  kind: name_stmt
  regex: _UID
  inside:
    stopBy: end
    matches: DEVICE_STMT

# `pattern`, `kind`, `regex`, `nthChild`, `range`, `inside`, `has`,
# `precedes`, `follows`, `all`, `any`, `not`, `matches`
