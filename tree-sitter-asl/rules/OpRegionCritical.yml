---
id: match-specific-opregion-offset
language: asl
message: OperationRegion with specific offset pointing to kernel space
severity: warning

rule:
  kind: OpRegionTerm
  all:
    - has:
        kind: RegionSpaceKeyword
        has:
          pattern: "SystemMemory"
    - has:
        field: Offset
        kind: IntegerLiteral
    - has:
        field: Length
        kind: IntegerLiteral

#     TermList: (OpRegionTerm [3, 4] - [3, 60]
#       RegionName: (NameString [3, 21] - [3, 25]
#         (NameSeg [3, 21] - [3, 25]))
#       RegionSpace: (RegionSpaceKeyword [3, 27] - [3, 39])
#       Offset: (IntegerLiteral [3, 41] - [3, 51])
#       Length: (IntegerLiteral [3, 53] - [3, 59]))
